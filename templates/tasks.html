<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tasks | Focus90</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
        background: #0f172a; color: white; font-family: 'Poppins', sans-serif;
        display: flex; flex-direction: column; align-items: center; padding: 40px;
    }
    /* Navigation Bar */
    .nav-header {
        width: 100%; max-width: 1000px; display: flex; justify-content: space-between;
        align-items: center; margin-bottom: 30px;
    }
    .btn-back {
        text-decoration: none; color: #9b9d9f; font-size: 14px; border: 1px solid rgba(255,255,255,0.1);
        padding: 8px 15px; border-radius: 10px; transition: 0.3s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.05); color: white; }

    /* Form Styling */
    .task-form {
        background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px;
        width: 100%; max-width: 600px; margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
    }
    input, select, textarea {
        width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
        background: rgba(0, 0, 0, 0.1); border: 1px solid rgba(9, 5, 5, 0.1);
        color: grey; outline: none;
    }
    button {
        width: 100%; padding: 12px; background: linear-gradient(90deg, #6366f1, #22d3ee);
        border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;
        transition: 0.3s;
    }
    button:hover { opacity: 0.9; transform: scale(0.98); }

    /* Task Cards */
    .cards {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px; width: 100%; max-width: 1000px;
    }
    .card {
        background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px;
        border-left: 5px solid #6366f1; transition: 0.3s; border-top: 1px solid rgba(255,255,255,0.1);
    }
    .card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
    
    .tag {
        font-size: 11px; padding: 4px 10px; border-radius: 6px; background: #334155;
        margin-right: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-done { color: #4ade80; font-weight: 600; }
    .status-pending { color: #fbbf24; font-weight: 600; }
    
    footer { margin-top: 60px; color: #64748b; font-size: 14px; }
  </style>
</head>
<body>

<div class="nav-header">
    <h1>📌 My Focus Tasks</h1>
    <a href="/index" class="btn-back">⬅ Home</a>
</div>

<div class="task-form">
  <form method="POST">
    <input type="text" name="task" placeholder="Task Title (e.g. Build API)" required>
    <textarea name="description" placeholder="Description (Optional details...)" rows="2"></textarea>
    
    <div style="display: flex; gap: 10px;">
      <select name="frequency" required>
        <option value="Daily">Daily Task</option>
        <option value="Weekly">Weekly Task</option>
      </select>
      
      <select name="category" required>
        <option value="Internship">Internship</option>
        <option value="School">School</option>
        <option value="College">College</option>
        <option value="Job">Job</option>
        <option value="Freelancer">Freelancer</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <button type="submit">Add Task</button>
  </form>
</div>

<div class="cards">
  {% for t in tasks %}
  <div class="card">
    <div style="margin-bottom: 15px;">
      <span class="tag" style="background: #4f46e5;">{{ t[4] }}</span> 
      <span class="tag" style="background: #1e293b;">{{ t[5] }}</span> 
    </div>
    
    <h3 style="margin-bottom: 8px;">{{ t[1] }}</h3> 
    <p style="font-size: 20px; color: #ffffff; margin-bottom: 20px; line-height: 1.5;">{{ t[3] }}</p> 
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span class="status-{{ t[2]|lower }}">{{ t[2] }}</span>
        <div style="display: flex; gap: 15px;">
            <a href="/done/{{ t[0] }}" style="text-decoration: none; font-size: 20px;" title="Mark as Done">✅</a>
            <a href="/delete/{{ t[0] }}" 
               onclick="return confirm('Are you sure you want to delete this task?')" 
               style="text-decoration: none; font-size: 20px;" title="Delete Task">❌</a>
        </div>
    </div>
  </div>
  {% endfor %}
</div>

<footer>
    <p>© 2026 Sagar Karosiya | Portfolio</p>
</footer>

</body>
</html>
