<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus90 | Credits</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #38bdf8; --bg: #0b0f1a; --card: rgba(255, 255, 255, 0.05); }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #0b0f1a 50%);
        }
        .credit-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .profile-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 600;
        }
        h1 { margin: 10px 0; font-size: 1.8rem; letter-spacing: 1px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px; }
        
        .links { display: flex; flex-direction: column; gap: 12px; }
        .link-item {
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
            transition: 0.3s;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }
        .link-item:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            transform: translateY(-3px);
        }
        .back-btn {
            margin-top: 30px;
            display: inline-block;
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="credit-card">
        <div class="profile-img">SK</div>
        <h1>Sagar Karosiya</h1>
        <p>Lead Developer | Focus90 Project</p>
        
        <div class="links">
            <a href="mailto:sagarsingkarosiya39082@gmail.com" class="link-item">📧 Email Me</a>
            <a href="https://linkedin.com/in/sagar-karosiya-b35527218" target="_blank" class="link-item">🔗 LinkedIn</a>
            <a href="https://github.com/sagarkarosiya" target="_blank" class="link-item">💻 GitHub</a>
        </div>

        <a href="{{ url_for('home') }}" class="back-btn">← Back to Dashboard</a>
    </div>
</body>
</html>
