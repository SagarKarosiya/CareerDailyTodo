<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus90 | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #38bdf8; --bg: #0b0f1a; }
        
        body {
            background: var(--bg);
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #0b0f1a 50%);
            overflow: hidden;
            text-align: center;
        }

        /* Fixed Canvas Styling */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Keep it behind the text */
        }

        .content-layer {
            position: relative;
            z-index: 10; /* Ensure text is above animation */
            pointer-events: none; /* Allows clicks to pass through to button */
        }

        .btn-enter {
            background: white;
            color: black;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            pointer-events: auto; /* Re-enable clicks for the button */
        }

        .glow { position: absolute; width: 600px; height: 600px; filter: blur(140px); opacity: 0.15; z-index: -1; border-radius: 50%; }
        .sub-header { color: white; font-size: 1.1rem; font-weight: 400; margin-bottom: 5px; }
        .tagline { color: #94a3b8; font-size: 0.85rem; margin-bottom: 30px; letter-spacing: 0.5px; }
        h1 { font-size: 5.5rem; font-weight: 600; margin: 0; letter-spacing: -3px; line-height: 1; }
        .user-welcome { color: #94a3b8; margin: 25px 0; font-size: 1.1rem; font-weight: 300; }
        .btn-enter:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,255,255,0.25); }
        
        footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.65rem;
            color: #475569;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="glow" style="top: -10%; left: -10%; background: var(--primary);"></div>
    
    <div class="content-layer">
        <div class="sub-header">Become Job Ready in 90 Days 🚀</div>
        <div class="tagline">Track tasks, learning, streaks & dominate your goals</div>
        
        <h1>Focus90</h1>
        
        <div class="user-welcome">Welcome back, {{ current_user.username }}</div>
        
        <a href="{{ url_for('index') }}" class="btn-enter">Start</a>
    </div>

    <footer>© 2026 SAGAR KAROSIYA | BUILT FOR PERFORMANCE</footer>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 0.5) - 0.25;
                let directionY = (Math.random() * 0.5) - 0.25;
                let color = 'rgba(99, 102, 241, 0.4)';
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                    + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        let opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = 'rgba(56, 189, 248,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        init();
        animate();
    </script>
</body>
</html>
