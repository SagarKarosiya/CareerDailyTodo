<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Focus90</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        min-height: 100vh;
        display: flex;
        flex-direction: column; /* Allows footer to sit at bottom */
        justify-content: center;
        align-items: center;
        color: white;
    }

    .container {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 40px;
        width: 380px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        text-align: center;
        z-index: 1;
    }

    h2 { margin-bottom: 25px; font-weight: 600; }

    input {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        background: rgba(255,255,255,0.05);
        color: white;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        background: rgba(255,255,255,0.1);
        border-color: #6366f1;
    }

    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(90deg, #6366f1, #22d3ee);
        border: none;
        border-radius: 12px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    button:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(99,102,241,0.4);
    }

    .alert {
        padding: 12px;
        margin-bottom: 20px;
        border-radius: 10px;
        background-color: rgba(239, 68, 68, 0.15);
        border: 1px solid #ef4444;
        color: #f87171;
        font-size: 13px;
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    footer {
        position: absolute;
        bottom: 20px;
        color: #64748b;
        font-size: 14px;
    }

    p { margin-top: 20px; color: #94a3b8; font-size: 14px; }
    a { color: #38bdf8; text-decoration: none; font-weight: 600; }
</style>
</head>

<body>

<div class="container">
    <h2>Welcome Back 👋</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div id="flash-container">
          {% for category, message in messages %}
            <div class="alert" id="flash-message">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="/signup">Signup</a></p>
</div>

<footer>
    <p>© 2026 Sagar Karosiya | Portfolio</p>
</footer>

<script>
    // Modern script to auto-hide the alert after 5 seconds
    window.onload = function() {
        const flashMessage = document.getElementById('flash-message');
        if (flashMessage) {
            setTimeout(() => {
                flashMessage.style.transition = "opacity 0.5s ease";
                flashMessage.style.opacity = "0";
                setTimeout(() => flashMessage.remove(), 500);
            }, 5000); // 5000ms = 5 seconds
        }
    };
</script>
    
</body>
</html>
