<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Focus90</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 40px;
    width: 350px;
    color: white;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #00c6ff;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
}

a {
    color: #00c6ff;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
    <h2>Welcome Back 👋</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Login</button>
    </form>

    <p>Don't have an account? <a href="/signup">Signup</a></p>
</div>

    <!-- FOOTER -->
<footer>
    <p>© 2026 Sagar Karosiya | Portfolio</p>
</footer>
    
</body>
</html>
